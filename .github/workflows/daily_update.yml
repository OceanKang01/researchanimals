name: Daily News Update

on:
  schedule:
    # 매일 한국 시간 아침 7시에 실행 (UTC 기준 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행을 위한 버튼 제공

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run Python script
        env:
          # AI API 키 (GitHub Repository Secrets에 설정 필요)
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python scripts/update_news.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add src/mockDatabase.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily news" && git push)
